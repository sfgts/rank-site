<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Season Badges</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080810;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    gap: 32px;
    flex-wrap: wrap;
    padding: 40px;
  }
  svg.badge {
    width: 160px;
    height: 184px;
    filter: drop-shadow(0 0 18px var(--glow));
    transition: transform 0.25s, filter 0.25s;
    cursor: pointer;
  }
  svg.badge:hover {
    transform: translateY(-8px) scale(1.06);
    filter: drop-shadow(0 0 36px var(--glow)) drop-shadow(0 0 8px var(--glow));
  }
  .winter { --glow: #00b4ff; }
  .spring { --glow: #39ff14; }
  .summer { --glow: #ffaa00; }
  .autumn { --glow: #ff4400; }
</style>
</head>
<body>

<!-- ══════════ WINTER ══════════ -->
<svg class="badge winter" viewBox="0 0 160 184" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>
    <radialGradient id="wFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1e38"/>
      <stop offset="100%" stop-color="#03080f"/>
    </radialGradient>
    <filter id="wg"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- outer hex glow -->
  <polygon points="80,4 152,44 152,140 80,180 8,140 8,44"
    fill="none" stroke="#00c6ff" stroke-width="1" opacity="0.2"/>
  <!-- spinning dash ring -->
  <polygon points="80,4 152,44 152,140 80,180 8,140 8,44"
    fill="none" stroke="url(#wRing)" stroke-width="2.5" stroke-dasharray="22 8" opacity="0.85">
    <animateTransform attributeName="transform" type="rotate" from="0 80 92" to="360 80 92" dur="12s" repeatCount="indefinite"/>
  </polygon>
  <!-- hex fill -->
  <polygon points="80,12 144,48 144,136 80,172 16,136 16,48" fill="url(#wFill)"/>
  <!-- inner ring -->
  <polygon points="80,22 134,53 134,131 80,162 26,131 26,53"
    fill="none" stroke="#00c6ff" stroke-width="1" opacity="0.12"/>

  <!-- Snowflake -->
  <g transform="translate(80,92)" filter="url(#wg)" stroke="#00c6ff" stroke-linecap="round">
    <line x1="0" y1="-38" x2="0" y2="38" stroke-width="3"/>
    <line x1="-33" y1="-19" x2="33" y2="19" stroke-width="3"/>
    <line x1="33" y1="-19" x2="-33" y2="19" stroke-width="3"/>
    <!-- branch ticks -->
    <line x1="-11" y1="-25" x2="0" y2="-38" stroke-width="2"/>
    <line x1="11" y1="-25" x2="0" y2="-38" stroke-width="2"/>
    <line x1="-11" y1="25" x2="0" y2="38" stroke-width="2"/>
    <line x1="11" y1="25" x2="0" y2="38" stroke-width="2"/>
    <line x1="-33" y1="-19" x2="-22" y2="-28" stroke-width="2"/>
    <line x1="-33" y1="-19" x2="-22" y2="-10" stroke-width="2"/>
    <line x1="33" y1="19" x2="22" y2="28" stroke-width="2"/>
    <line x1="33" y1="19" x2="22" y2="10" stroke-width="2"/>
    <line x1="33" y1="-19" x2="22" y2="-28" stroke-width="2"/>
    <line x1="33" y1="-19" x2="22" y2="-10" stroke-width="2"/>
    <line x1="-33" y1="19" x2="-22" y2="28" stroke-width="2"/>
    <line x1="-33" y1="19" x2="-22" y2="10" stroke-width="2"/>
  </g>
  <circle cx="80" cy="92" r="5" fill="#00c6ff" filter="url(#wg)"/>

  <!-- corner dots -->
  <circle cx="80" cy="4" r="3.5" fill="#00c6ff" opacity="0.7"/>
  <circle cx="152" cy="44" r="3.5" fill="#00c6ff" opacity="0.7"/>
  <circle cx="152" cy="140" r="3.5" fill="#00c6ff" opacity="0.7"/>
  <circle cx="80" cy="180" r="3.5" fill="#00c6ff" opacity="0.7"/>
  <circle cx="8" cy="140" r="3.5" fill="#00c6ff" opacity="0.7"/>
  <circle cx="8" cy="44" r="3.5" fill="#00c6ff" opacity="0.7"/>
</svg>

<!-- ══════════ SPRING ══════════ -->
<svg class="badge spring" viewBox="0 0 160 184" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff14"/>
      <stop offset="100%" stop-color="#00e5a0"/>
    </linearGradient>
    <radialGradient id="spFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#061a0a"/>
      <stop offset="100%" stop-color="#020a04"/>
    </radialGradient>
    <filter id="spg"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <polygon points="80,4 152,44 152,140 80,180 8,140 8,44"
    fill="none" stroke="#39ff14" stroke-width="1" opacity="0.2"/>
  <polygon points="80,4 152,44 152,140 80,180 8,140 8,44"
    fill="none" stroke="url(#spRing)" stroke-width="2.5" stroke-dasharray="14 10" opacity="0.85">
    <animateTransform attributeName="transform" type="rotate" from="360 80 92" to="0 80 92" dur="10s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="80,12 144,48 144,136 80,172 16,136 16,48" fill="url(#spFill)"/>
  <polygon points="80,22 134,53 134,131 80,162 26,131 26,53"
    fill="none" stroke="#39ff14" stroke-width="1" opacity="0.1"/>

  <!-- Sprout -->
  <g transform="translate(80,92)" filter="url(#spg)">
    <!-- stem -->
    <line x1="0" y1="36" x2="0" y2="-8" stroke="#39ff14" stroke-width="3" stroke-linecap="round"/>
    <!-- left leaf -->
    <path d="M0,8 C-28,-6 -36,-30 -8,-38 C-4,-18 -1,-4 0,8 Z" fill="#39ff14" opacity="0.95"/>
    <line x1="0" y1="8" x2="-18" y2="-28" stroke="#020a04" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <!-- right leaf -->
    <path d="M0,8 C28,-6 36,-30 8,-38 C4,-18 1,-4 0,8 Z" fill="#00e5a0" opacity="0.9"/>
    <line x1="0" y1="8" x2="18" y2="-28" stroke="#020a04" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <!-- bud -->
    <circle cx="0" cy="-40" r="5" fill="#39ff14"/>
    <circle cx="-5" cy="-48" r="4" fill="#80ff60"/>
    <circle cx="5" cy="-48" r="4" fill="#80ff60"/>
    <!-- roots -->
    <line x1="0" y1="36" x2="-16" y2="48" stroke="#39ff14" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <line x1="0" y1="36" x2="16" y2="48" stroke="#39ff14" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <line x1="0" y1="36" x2="0" y2="50" stroke="#39ff14" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  </g>

  <circle cx="80" cy="4" r="3.5" fill="#39ff14" opacity="0.7"/>
  <circle cx="152" cy="44" r="3.5" fill="#39ff14" opacity="0.7"/>
  <circle cx="152" cy="140" r="3.5" fill="#39ff14" opacity="0.7"/>
  <circle cx="80" cy="180" r="3.5" fill="#39ff14" opacity="0.7"/>
  <circle cx="8" cy="140" r="3.5" fill="#39ff14" opacity="0.7"/>
  <circle cx="8" cy="44" r="3.5" fill="#39ff14" opacity="0.7"/>
</svg>

<!-- ══════════ SUMMER ══════════ -->
<svg class="badge summer" viewBox="0 0 160 184" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="suRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <radialGradient id="suFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e0e00"/>
      <stop offset="100%" stop-color="#080400"/>
    </radialGradient>
    <filter id="sug"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <polygon points="80,4 152,44 152,140 80,180 8,140 8,44"
    fill="none" stroke="#ff6a00" stroke-width="1" opacity="0.2"/>
  <polygon points="80,4 152,44 152,140 80,180 8,140 8,44"
    fill="none" stroke="url(#suRing)" stroke-width="2.5" stroke-dasharray="18 6" opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" from="0 80 92" to="360 80 92" dur="8s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="80,12 144,48 144,136 80,172 16,136 16,48" fill="url(#suFill)"/>
  <polygon points="80,22 134,53 134,131 80,162 26,131 26,53"
    fill="none" stroke="#ffcc00" stroke-width="1" opacity="0.1"/>

  <!-- Sun -->
  <g transform="translate(80,92)" filter="url(#sug)">
    <g stroke="#ffcc00" stroke-linecap="round" stroke-width="3">
      <line x1="0" y1="-52" x2="0" y2="-36"/>
      <line x1="0" y1="52" x2="0" y2="36"/>
      <line x1="-52" y1="0" x2="-36" y2="0"/>
      <line x1="52" y1="0" x2="36" y2="0"/>
      <line x1="-37" y1="-37" x2="-25" y2="-25"/>
      <line x1="37" y1="-37" x2="25" y2="-25"/>
      <line x1="-37" y1="37" x2="-25" y2="25"/>
      <line x1="37" y1="37" x2="25" y2="25"/>
    </g>
    <circle cx="0" cy="0" r="26" fill="#ff6a00" opacity="0.5"/>
    <circle cx="0" cy="0" r="20" fill="#ff8c00"/>
    <circle cx="0" cy="0" r="14" fill="#ffcc00"/>
    <circle cx="0" cy="0" r="7" fill="#fff5b0"/>
    <ellipse cx="-4" cy="-4" rx="4" ry="2.5" fill="white" opacity="0.25" transform="rotate(-35,-4,-4)"/>
  </g>

  <circle cx="80" cy="4" r="3.5" fill="#ffcc00" opacity="0.7"/>
  <circle cx="152" cy="44" r="3.5" fill="#ffcc00" opacity="0.7"/>
  <circle cx="152" cy="140" r="3.5" fill="#ffcc00" opacity="0.7"/>
  <circle cx="80" cy="180" r="3.5" fill="#ffcc00" opacity="0.7"/>
  <circle cx="8" cy="140" r="3.5" fill="#ffcc00" opacity="0.7"/>
  <circle cx="8" cy="44" r="3.5" fill="#ffcc00" opacity="0.7"/>
</svg>

<!-- ══════════ AUTUMN ══════════ -->
<svg class="badge autumn" viewBox="0 0 160 184" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="auRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#cc00ff"/>
    </linearGradient>
    <radialGradient id="auFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#080200"/>
    </radialGradient>
    <filter id="aug"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <polygon points="80,4 152,44 152,140 80,180 8,140 8,44"
    fill="none" stroke="#ff4500" stroke-width="1" opacity="0.2"/>
  <polygon points="80,4 152,44 152,140 80,180 8,140 8,44"
    fill="none" stroke="url(#auRing)" stroke-width="2.5" stroke-dasharray="10 12" opacity="0.85">
    <animateTransform attributeName="transform" type="rotate" from="360 80 92" to="0 80 92" dur="14s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="80,12 144,48 144,136 80,172 16,136 16,48" fill="url(#auFill)"/>
  <polygon points="80,22 134,53 134,131 80,162 26,131 26,53"
    fill="none" stroke="#ff4500" stroke-width="1" opacity="0.1"/>

  <!-- Maple leaf -->
  <g transform="translate(80,92)" filter="url(#aug)">
    <path d="
      M0,-46
      C4,-34 14,-30 10,-18
      C18,-20 26,-12 20,-2
      C28,-1 30,12 20,14
      C24,22 16,30 8,24
      C6,32 2,38 0,42
      C-2,38 -6,32 -8,24
      C-16,30 -24,22 -20,14
      C-30,12 -28,-1 -20,-2
      C-26,-12 -18,-20 -10,-18
      C-14,-30 -4,-34 0,-46 Z"
      fill="#ff4500"/>
    <path d="
      M0,-46
      C4,-34 14,-30 10,-18
      C18,-20 26,-12 20,-2
      C28,-1 30,12 20,14
      C24,22 16,30 8,24
      C6,32 2,38 0,42
      C-2,38 -6,32 -8,24
      C-16,30 -24,22 -20,14
      C-30,12 -28,-1 -20,-2
      C-26,-12 -18,-20 -10,-18
      C-14,-30 -4,-34 0,-46 Z"
      fill="none" stroke="#ff8c42" stroke-width="1.5" opacity="0.6"/>
    <!-- veins -->
    <line x1="0" y1="-38" x2="0" y2="40" stroke="#6b0f00" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="2" x2="-22" y2="-12" stroke="#6b0f00" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="2" x2="22" y2="-12" stroke="#6b0f00" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="-14" x2="-18" y2="-30" stroke="#6b0f00" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="-14" x2="18" y2="-30" stroke="#6b0f00" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <!-- stem -->
    <line x1="0" y1="42" x2="0" y2="54" stroke="#cc3300" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <circle cx="80" cy="4" r="3.5" fill="#ff4500" opacity="0.7"/>
  <circle cx="152" cy="44" r="3.5" fill="#cc00ff" opacity="0.7"/>
  <circle cx="152" cy="140" r="3.5" fill="#ff4500" opacity="0.7"/>
  <circle cx="80" cy="180" r="3.5" fill="#cc00ff" opacity="0.7"/>
  <circle cx="8" cy="140" r="3.5" fill="#ff4500" opacity="0.7"/>
  <circle cx="8" cy="44" r="3.5" fill="#cc00ff" opacity="0.7"/>
</svg>

</body>
</html>
