<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESB — Admin Panel</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    /* ===== Login ===== */
    .login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .login-card { width:100%; max-width:360px; background:var(--card-bg); border:1px solid var(--card-border); border-radius:var(--radius-lg); padding:32px; box-shadow:var(--shadow-card); animation:fadeIn 320ms var(--ease) both; }
    .login-card h2 { margin:0 0 4px; font-size:22px; }
    .login-sub { opacity:0.6; font-size:13px; margin:0 0 24px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:12px; opacity:0.7; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em; }
    .field input[type=password],
    .field input[type=email] { width:100%; padding:10px 12px; border-radius:var(--radius-sm); border:1px solid var(--soft-border); background:var(--soft-bg); color:inherit; font:inherit; font-size:15px; outline:none; transition:border-color var(--t) var(--ease),box-shadow var(--t) var(--ease); }
    .field input[type=password]:focus,
    .field input[type=email]:focus { border-color:var(--accent-border); box-shadow:0 0 0 3px rgba(53,192,122,0.15); }
    .btn-primary { width:100%; padding:12px; border-radius:var(--radius-sm); border:none; background:var(--accent); color:#0b0f14; font:inherit; font-size:15px; font-weight:700; cursor:pointer; transition:background var(--t) var(--ease),transform var(--t) var(--ease); }
    .btn-primary:hover { background:#43d088; }
    .btn-primary:active { transform:translateY(1px); }
    .error-msg { color:#ff7676; font-size:13px; margin:0 0 12px; }

    /* ===== Header ===== */
    .admin-header { padding:16px 0; border-bottom:1px solid rgba(255,255,255,0.08); position:sticky; top:0; z-index:50; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); background:rgba(11,15,20,0.6); }
    .admin-header-row { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    .admin-title { margin:0; font-size:20px; }

    /* ===== Tabs ===== */
    .admin-tabs { display:flex; gap:4px; padding:0 0 0 2px; margin:16px 0 0; border-bottom:1px solid rgba(255,255,255,0.08); }
    .admin-tab { padding:9px 20px; border:none; background:none; color:inherit; font:inherit; font-size:14px; cursor:pointer; border-radius:var(--radius-sm) var(--radius-sm) 0 0; opacity:0.55; transition:background var(--t) var(--ease),opacity var(--t) var(--ease); }
    .admin-tab:hover { opacity:0.85; background:rgba(255,255,255,0.05); }
    .admin-tab.tab-active { opacity:1; font-weight:600; background:rgba(53,192,122,0.1); color:var(--accent); border-bottom:2px solid var(--accent); }

    /* ===== Stats ===== */
    .stats-bar { display:flex; gap:12px; flex-wrap:wrap; margin:16px 0; }
    .stat-pill { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:99px; background:var(--soft-bg); border:1px solid var(--card-border); font-size:13px; }
    .stat-pill .count { font-weight:700; font-variant-numeric:tabular-nums; }
    .stat-pill.hidden-pill { border-color:rgba(255,118,118,0.35); background:rgba(255,118,118,0.08); }
    .stat-pill.hidden-pill .count { color:#ff7676; }

    /* ===== Player section ===== */
    .admin-search { margin-bottom:12px; }
    .admin-search input { width:100%; padding:10px 14px; border-radius:var(--radius-sm); border:1px solid var(--soft-border); background:var(--soft-bg); color:inherit; font:inherit; outline:none; transition:border-color var(--t) var(--ease),box-shadow var(--t) var(--ease); }
    .admin-search input:focus { border-color:var(--accent-border); box-shadow:0 0 0 3px rgba(53,192,122,0.15); }
    .player-list { display:flex; flex-direction:column; gap:8px; padding-bottom:32px; }
    .player-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 14px; border-radius:var(--radius-md); background:var(--card-bg); border:1px solid var(--card-border); transition:background var(--t) var(--ease),border-color var(--t) var(--ease),opacity var(--t) var(--ease); }
    .player-row--hidden { opacity:0.45; background:rgba(255,118,118,0.04); border-color:rgba(255,118,118,0.2); }
    .player-row-info { display:flex; align-items:center; gap:12px; min-width:0; }
    .player-row-avatar { width:40px; height:40px; border-radius:50%; object-fit:cover; border:1px solid var(--card-border); flex-shrink:0; background:rgba(0,0,0,0.25); }
    .player-row-nick { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .player-row-rating { font-size:12px; opacity:0.6; font-variant-numeric:tabular-nums; }

    /* ===== Toggle ===== */
    .toggle { display:flex; align-items:center; gap:8px; cursor:pointer; flex-shrink:0; }
    .toggle input { position:absolute; opacity:0; width:0; height:0; }
    .toggle-track { position:relative; width:44px; height:24px; border-radius:99px; background:rgba(255,118,118,0.3); border:1px solid rgba(255,118,118,0.4); transition:background var(--t) var(--ease),border-color var(--t) var(--ease); flex-shrink:0; }
    .toggle input:checked + .toggle-track { background:rgba(53,192,122,0.25); border-color:var(--accent-border); }
    .toggle-thumb { position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#ff7676; transition:transform var(--t) var(--ease),background var(--t) var(--ease); }
    .toggle input:checked + .toggle-track .toggle-thumb { transform:translateX(20px); background:var(--accent); }
    .toggle-label { font-size:13px; opacity:0.75; width:52px; }
    .loading-msg { opacity:0.6; padding:24px 0; text-align:center; font-size:14px; }

    /* ===== Row actions ===== */
    .row-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .upload-btn { display:flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:var(--radius-sm); background:var(--soft-bg); border:1px solid var(--soft-border); cursor:pointer; font-size:15px; transition:background var(--t) var(--ease),border-color var(--t) var(--ease); flex-shrink:0; }
    .upload-btn:hover { background:rgba(53,192,122,0.12); border-color:var(--accent-border); }
    .trophy-btn { display:flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:var(--radius-sm); background:var(--soft-bg); border:1px solid var(--soft-border); cursor:pointer; font-size:15px; transition:background var(--t) var(--ease),border-color var(--t) var(--ease); flex-shrink:0; }
    .trophy-btn:hover { background:rgba(218,184,35,0.12); border-color:rgba(218,184,35,0.5); }
    .trophy-btn.has-ach { border-color:rgba(218,184,35,0.6); background:rgba(218,184,35,0.1); }

    /* ===== Dashboard ===== */
    .dash-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:12px; margin-bottom:24px; }
    .dash-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:var(--radius-md); padding:16px 12px; text-align:center; }
    .dash-card-val { font-size:30px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--accent); line-height:1; }
    .dash-card-label { font-size:11px; opacity:0.55; margin-top:6px; text-transform:uppercase; letter-spacing:0.04em; }
    .dash-h3 { font-size:11px; font-weight:700; opacity:0.45; margin:22px 0 8px; text-transform:uppercase; letter-spacing:0.07em; }
    .mover-row { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:var(--radius-sm); background:var(--card-bg); border:1px solid var(--card-border); margin-bottom:6px; }
    .mover-rank { font-size:11px; opacity:0.35; width:16px; text-align:center; flex-shrink:0; }
    .mover-nick { flex:1; font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
    .mover-delta { font-size:13px; font-weight:700; font-variant-numeric:tabular-nums; flex-shrink:0; }
    .group-bar-row { display:flex; align-items:center; gap:10px; font-size:13px; margin-bottom:7px; }
    .group-bar-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
    .group-bar-name { width:120px; font-weight:600; flex-shrink:0; }
    .group-bar-track { flex:1; background:var(--soft-bg); border-radius:99px; height:7px; overflow:hidden; }
    .group-bar-fill { height:100%; border-radius:99px; transition:width 700ms cubic-bezier(0.22,0.61,0.36,1); }
    .group-bar-count { width:32px; text-align:right; opacity:0.5; font-size:12px; }

    /* ===== Log ===== */
    .log-wrap { background:var(--card-bg); border:1px solid var(--card-border); border-radius:var(--radius-md); overflow:hidden; }
    .log-table { width:100%; border-collapse:collapse; font-size:13px; }
    .log-table th { text-align:left; padding:9px 12px; border-bottom:1px solid var(--card-border); font-size:11px; opacity:0.45; text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }
    .log-table td { padding:9px 12px; border-bottom:1px solid var(--row-border); vertical-align:top; }
    .log-table tbody tr:last-child td { border-bottom:none; }
    .log-time { opacity:0.45; white-space:nowrap; font-variant-numeric:tabular-nums; font-size:12px; }
    .log-action { font-weight:600; white-space:nowrap; }
    .log-details { opacity:0.7; }

    /* ===== Achievement picker ===== */
    .ach-picker { position:fixed; z-index:200; background:var(--card-bg); border:1px solid var(--card-border); border-radius:var(--radius-md); padding:10px; min-width:230px; max-height:320px; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.55); }
    .ach-picker-item { display:flex; align-items:center; gap:8px; padding:7px 6px; cursor:pointer; border-radius:var(--radius-sm); font-size:13px; }
    .ach-picker-item:hover { background:var(--soft-bg); }
    .ach-picker-item img { width:28px; height:28px; border-radius:50%; object-fit:cover; background:#111; }
    .ach-picker-item input[type=checkbox] { accent-color:var(--accent); flex-shrink:0; }

    /* ===== Achievements section ===== */
    .ach-section { padding-bottom:32px; }
    .ach-section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .ach-section-title { margin:0; font-size:16px; font-weight:600; }

    /* New achievement form */
    .ach-create-form { display:none; flex-direction:column; gap:12px; padding:16px; background:var(--card-bg); border:1px solid var(--card-border); border-radius:var(--radius-md); margin-bottom:16px; }
    .ach-form-row { display:flex; flex-direction:column; gap:6px; }
    .ach-form-label { font-size:12px; opacity:0.6; text-transform:uppercase; letter-spacing:0.04em; }
    .ach-form-input { padding:9px 12px; border-radius:var(--radius-sm); border:1px solid var(--soft-border); background:var(--soft-bg); color:inherit; font:inherit; outline:none; }
    .ach-form-input:focus { border-color:var(--accent-border); box-shadow:0 0 0 3px rgba(53,192,122,0.15); }
    .ach-form-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:4px; }

    /* Achievement cards */
    .ach-card-list { display:flex; flex-direction:column; gap:8px; }
    .ach-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:var(--radius-md); padding:12px 14px; transition:opacity var(--t) var(--ease); }
    .ach-card-view { display:flex; align-items:center; gap:12px; }
    .ach-card-icon { width:44px; height:44px; border-radius:50%; object-fit:cover; border:2px solid rgba(218,184,35,0.4); background:#111; flex-shrink:0; }
    .ach-card-info { flex:1; min-width:0; }
    .ach-card-name { font-weight:600; font-size:14px; }
    .ach-card-url { font-size:12px; opacity:0.55; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ach-card-url a { color:var(--accent); text-decoration:none; }
    .ach-card-url a:hover { text-decoration:underline; }
    .ach-card-actions { display:flex; gap:8px; flex-shrink:0; }

    /* Edit form inside card */
    .ach-card-edit { display:none; flex-direction:column; gap:10px; padding-top:12px; border-top:1px solid var(--card-border); margin-top:12px; }
    .ach-edit-row { display:flex; flex-direction:column; gap:5px; }
    .ach-edit-label { font-size:11px; opacity:0.55; text-transform:uppercase; letter-spacing:0.04em; }
    .ach-edit-input { padding:8px 12px; border-radius:var(--radius-sm); border:1px solid var(--soft-border); background:var(--soft-bg); color:inherit; font:inherit; outline:none; }
    .ach-edit-input:focus { border-color:var(--accent-border); box-shadow:0 0 0 3px rgba(53,192,122,0.15); }
  </style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="adminLoadingOverlay" class="loading-overlay hidden">
  <div class="loading-box">
    <div class="loading-spinner"></div>
    <div class="loading-text">ESB Admin</div>
    <div class="loading-sub">Loading data…</div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginSection" class="login-screen">
  <div class="login-card">
    <h2>ESB Admin</h2>
    <p id="loginError" class="error-msg" style="display:none;">Invalid email or password</p>
    <div class="field">
      <label for="emailInput">Email</label>
      <input id="emailInput" type="email" placeholder="Enter email..." autocomplete="username" />
    </div>
    <div class="field">
      <label for="passwordInput">Password</label>
      <input id="passwordInput" type="password" placeholder="Enter password..." autocomplete="current-password" />
    </div>
    <button id="loginBtn" class="btn-primary" type="button">Log in</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="panelSection" style="display:none;">
  <header class="admin-header">
    <div class="container admin-header-row">
      <h1 class="admin-title">ESB Admin</h1>
      <div style="display:flex;gap:8px;align-items:center;">
        <a href="./index.html" class="btn" style="text-decoration:none;font-size:13px;">← Back to site</a>
        <button id="logoutBtn" class="btn" type="button" style="font-size:13px;">Log out</button>
      </div>
    </div>
    <div class="container">
      <div class="admin-tabs">
        <button id="tabPlayers" class="admin-tab tab-active" type="button">👥 Players</button>
        <button id="tabAchievements" class="admin-tab" type="button">🏆 Achievements</button>
        <button id="tabDashboard" class="admin-tab" type="button">📊 Dashboard</button>
        <button id="tabLog" class="admin-tab" type="button">📋 Log</button>
      </div>
    </div>
  </header>

  <main class="container" style="padding-top:16px;">

    <!-- PLAYERS TAB -->
    <div id="sectionPlayers">
      <div class="stats-bar">
        <span class="stat-pill"><span>Visible:</span><span class="count" id="totalVisible">—</span></span>
        <span class="stat-pill hidden-pill"><span>Hidden:</span><span class="count" id="totalHidden">0</span></span>
        <button id="exportCsvBtn" class="btn" type="button" style="font-size:13px;margin-left:auto;">📥 Export CSV</button>
      </div>
      <div class="admin-search">
        <input id="adminSearch" type="search" placeholder="Search by nickname..." autocomplete="off" />
      </div>
      <div id="playerList" class="player-list">
        <p class="loading-msg">Loading…</p>
      </div>
    </div>

    <!-- ACHIEVEMENTS TAB -->
    <div id="sectionAchievements" style="display:none;" class="ach-section">
      <div class="ach-section-header">
        <h2 class="ach-section-title">Achievements</h2>
        <button id="addAchBtn" class="btn" type="button" style="font-size:13px;">+ New achievement</button>
      </div>

      <!-- Create form -->
      <div id="addAchForm" class="ach-create-form">
        <div class="ach-form-row">
          <label class="ach-form-label">Name</label>
          <input id="achNameInput" class="ach-form-input" type="text" placeholder="e.g. Winner 2026 ESportsBattle CUP" />
        </div>
        <div class="ach-form-row">
          <label class="ach-form-label">Link (URL) — optional</label>
          <input id="achUrlInput" class="ach-form-input" type="url" placeholder="https://..." />
        </div>
        <div class="ach-form-row">
          <label class="ach-form-label">Icon image</label>
          <div style="display:flex;align-items:center;gap:10px;">
            <label class="upload-btn" title="Choose icon">🖼<input id="achIconInput" type="file" accept="image/*" style="display:none" /></label>
            <span id="achIconName" style="font-size:13px;opacity:0.55;">No file chosen</span>
          </div>
        </div>
        <div class="ach-form-actions">
          <button id="achSaveBtn" class="btn" type="button" style="background:var(--accent);color:#0b0f14;font-weight:700;font-size:13px;">Save</button>
          <button id="achCancelBtn" class="btn" type="button" style="font-size:13px;">Cancel</button>
        </div>
      </div>

      <!-- List of existing achievements -->
      <div id="achCardList" class="ach-card-list">
        <p class="loading-msg">Loading…</p>
      </div>
    </div>

    <!-- DASHBOARD TAB -->
    <div id="sectionDashboard" style="display:none;padding-bottom:32px;">
      <p class="loading-msg">Loading dashboard…</p>
    </div>

    <!-- LOG TAB -->
    <div id="sectionLog" style="display:none;padding-bottom:32px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h2 style="margin:0;font-size:16px;font-weight:600;">Activity Log</h2>
        <button id="clearLogBtn" class="btn" type="button" style="font-size:13px;color:#ff7676;">🗑 Clear log</button>
      </div>
      <div id="logList"><p class="loading-msg">Loading…</p></div>
    </div>

  </main>
</div>

<script src="./js/admin.js" defer></script>
</body>
</html>
